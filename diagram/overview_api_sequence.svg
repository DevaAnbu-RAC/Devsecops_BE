<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1350" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="1100" height="1350" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Overview API - Sequence Flow Diagram</text>
  <text x="550" y="55" text-anchor="middle" font-size="12" fill="#666">GET /api/v1/overview | GET /api/v1/specializations</text>

  <!-- Participants -->
  <!-- Client -->
  <rect x="60" y="80" width="100" height="40" rx="5" fill="#4a90d9" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="110" y="105" text-anchor="middle" fill="#fff" font-weight="bold">Client</text>
  <line x1="110" y1="120" x2="110" y2="1300" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- FastAPI Router -->
  <rect x="220" y="80" width="120" height="40" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="280" y="105" text-anchor="middle" fill="#fff" font-weight="bold">FastAPI Router</text>
  <line x1="280" y1="120" x2="280" y2="1300" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- JWT Middleware -->
  <rect x="390" y="80" width="130" height="40" rx="5" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
  <text x="455" y="105" text-anchor="middle" fill="#fff" font-weight="bold">JWT Middleware</text>
  <line x1="455" y1="120" x2="455" y2="1300" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Overview Service -->
  <rect x="570" y="80" width="140" height="40" rx="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5"/>
  <text x="640" y="105" text-anchor="middle" fill="#fff" font-weight="bold">Overview Service</text>
  <line x1="640" y1="120" x2="640" y2="1300" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Repository Layer -->
  <rect x="760" y="80" width="130" height="40" rx="5" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5"/>
  <text x="825" y="105" text-anchor="middle" fill="#fff" font-weight="bold">Repository</text>
  <line x1="825" y1="120" x2="825" y2="1300" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- PostgreSQL -->
  <rect x="940" y="80" width="110" height="40" rx="5" fill="#c0392b" stroke="#922b21" stroke-width="1.5"/>
  <text x="995" y="105" text-anchor="middle" fill="#fff" font-weight="bold">PostgreSQL</text>
  <line x1="995" y1="120" x2="995" y2="1300" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ============================================ -->
  <!-- FLOW 1: Successful Overview Request -->
  <!-- ============================================ -->
  
  <!-- Section Label -->
  <rect x="30" y="145" width="1040" height="25" rx="3" fill="#eaf4fc" stroke="#b8d4e8" stroke-width="1"/>
  <text x="550" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c6fad">Happy Path: GET /api/v1/overview?period=last_month&amp;specialization=devsecops</text>

  <!-- Step 1: Client sends request -->
  <line x1="110" y1="190" x2="270" y2="190" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="190" y="183" text-anchor="middle" font-size="11" fill="#333">GET /api/v1/overview</text>
  <text x="190" y="196" text-anchor="middle" font-size="10" fill="#666">Authorization: Bearer &lt;token&gt;</text>

  <!-- Step 2: Router forwards to middleware -->
  <line x1="280" y1="220" x2="445" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="362" y="213" text-anchor="middle" font-size="11" fill="#333">Validate JWT Token</text>

  <!-- Step 3: Middleware validates token -->
  <rect x="430" y="235" width="50" height="30" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
  <text x="455" y="254" text-anchor="middle" font-size="10" fill="#e67e22">Decode</text>
  <text x="455" y="264" text-anchor="middle" font-size="9" fill="#e67e22">JWT</text>

  <!-- Step 4: Token valid, forward to service -->
  <line x1="455" y1="280" x2="280" y2="280" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowhead-green)"/>
  <text x="367" y="273" text-anchor="middle" font-size="10" fill="#27ae60">✓ Token Valid (claims attached)</text>

  <!-- Step 5: Router validates query params -->
  <rect x="255" y="295" width="50" height="30" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="280" y="310" text-anchor="middle" font-size="9" fill="#27ae60">Validate</text>
  <text x="280" y="320" text-anchor="middle" font-size="9" fill="#27ae60">Params</text>

  <!-- Step 6: Router calls service -->
  <line x1="280" y1="340" x2="630" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="455" y="333" text-anchor="middle" font-size="11" fill="#333">get_overview_metrics(period, specialization)</text>

  <!-- Step 7: Service calls repository for KPI -->
  <line x1="640" y1="370" x2="815" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="727" y="363" text-anchor="middle" font-size="11" fill="#333">get_kpi_history(period, specialization_ids)</text>

  <!-- Step 8: Repository queries DB -->
  <line x1="825" y1="400" x2="985" y2="400" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="910" y="393" text-anchor="middle" font-size="11" fill="#333">SELECT from kpi_history</text>
  <text x="910" y="406" text-anchor="middle" font-size="10" fill="#666">JOIN specializations</text>

  <!-- Step 9: DB returns KPI data -->
  <line x1="985" y1="430" x2="835" y2="430" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="910" y="423" text-anchor="middle" font-size="10" fill="#c0392b">KPI records</text>

  <!-- Step 10: Service calls repository for status distribution -->
  <line x1="640" y1="460" x2="815" y2="460" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="727" y="453" text-anchor="middle" font-size="11" fill="#333">get_status_distribution(specialization_ids)</text>

  <!-- Step 11: Repository queries DB for status -->
  <line x1="825" y1="490" x2="985" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="910" y="483" text-anchor="middle" font-size="11" fill="#333">SELECT from projects</text>
  <text x="910" y="496" text-anchor="middle" font-size="10" fill="#666">JOIN statuses (GROUP BY)</text>

  <!-- Step 12: DB returns status data -->
  <line x1="985" y1="520" x2="835" y2="520" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="910" y="513" text-anchor="middle" font-size="10" fill="#c0392b">Status counts</text>

  <!-- Step 13: Repository returns to service -->
  <line x1="815" y1="550" x2="650" y2="550" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-purple)"/>
  <text x="732" y="543" text-anchor="middle" font-size="10" fill="#8e44ad">Aggregated data</text>

  <!-- Step 14: Service computes trends and builds response -->
  <rect x="615" y="565" width="50" height="35" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1"/>
  <text x="640" y="580" text-anchor="middle" font-size="9" fill="#8e44ad">Compute</text>
  <text x="640" y="592" text-anchor="middle" font-size="9" fill="#8e44ad">Trends</text>

  <!-- Step 15: Service returns to router -->
  <line x1="630" y1="615" x2="290" y2="615" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-purple)"/>
  <text x="460" y="608" text-anchor="middle" font-size="10" fill="#8e44ad">OverviewResponse (metrics + statusDistribution)</text>

  <!-- Step 16: Router returns to client -->
  <line x1="270" y1="645" x2="120" y2="645" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-green)"/>
  <text x="195" y="638" text-anchor="middle" font-size="11" fill="#27ae60">HTTP 200 - BaseResponse</text>
  <text x="195" y="651" text-anchor="middle" font-size="10" fill="#666">{status, message, data}</text>

  <!-- ============================================ -->
  <!-- FLOW 2: Authentication Failure -->
  <!-- ============================================ -->
  
  <rect x="30" y="680" width="1040" height="25" rx="3" fill="#fdedec" stroke="#e6b0aa" stroke-width="1"/>
  <text x="550" y="697" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Error Path: Invalid/Missing JWT Token (401 Unauthorized)</text>

  <!-- Client sends request without valid token -->
  <line x1="110" y1="725" x2="270" y2="725" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="190" y="718" text-anchor="middle" font-size="11" fill="#333">GET /api/v1/overview</text>
  <text x="190" y="731" text-anchor="middle" font-size="10" fill="#c0392b">Missing/Invalid Token</text>

  <!-- Router forwards to middleware -->
  <line x1="280" y1="755" x2="445" y2="755" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="362" y="748" text-anchor="middle" font-size="11" fill="#333">Validate JWT Token</text>

  <!-- Middleware rejects -->
  <rect x="430" y="770" width="50" height="25" fill="#fdedec" stroke="#c0392b" stroke-width="1"/>
  <text x="455" y="787" text-anchor="middle" font-size="9" fill="#c0392b">✗ Invalid</text>

  <!-- Middleware returns 401 -->
  <line x1="455" y1="810" x2="290" y2="810" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="372" y="803" text-anchor="middle" font-size="10" fill="#c0392b">401 Unauthorized</text>

  <!-- Router returns to client -->
  <line x1="270" y1="835" x2="120" y2="835" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="195" y="828" text-anchor="middle" font-size="11" fill="#c0392b">HTTP 401</text>
  <text x="195" y="841" text-anchor="middle" font-size="10" fill="#666">{status: "failed", message: "..."}</text>

  <!-- ============================================ -->
  <!-- FLOW 3: Invalid Query Parameter -->
  <!-- ============================================ -->
  
  <rect x="30" y="870" width="1040" height="25" rx="3" fill="#fef9e7" stroke="#f9e79f" stroke-width="1"/>
  <text x="550" y="887" text-anchor="middle" font-size="12" font-weight="bold" fill="#d68910">Error Path: Invalid Query Parameter (400 Bad Request)</text>

  <!-- Client sends request with bad param -->
  <line x1="110" y1="915" x2="270" y2="915" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="190" y="908" text-anchor="middle" font-size="11" fill="#333">GET /api/v1/overview</text>
  <text x="190" y="921" text-anchor="middle" font-size="10" fill="#d68910">?period=invalid_value</text>

  <!-- Router validates and middleware passes -->
  <line x1="280" y1="945" x2="445" y2="945" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="362" y="938" text-anchor="middle" font-size="11" fill="#333">Validate JWT ✓</text>

  <line x1="445" y1="965" x2="290" y2="965" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-green)"/>
  <text x="367" y="958" text-anchor="middle" font-size="10" fill="#27ae60">Token Valid</text>

  <!-- Router validates params - fails -->
  <rect x="255" y="980" width="50" height="25" fill="#fef9e7" stroke="#d68910" stroke-width="1"/>
  <text x="280" y="997" text-anchor="middle" font-size="9" fill="#d68910">✗ Invalid</text>

  <!-- Router returns 400 -->
  <line x1="270" y1="1020" x2="120" y2="1020" stroke="#d68910" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-orange)"/>
  <text x="195" y="1013" text-anchor="middle" font-size="11" fill="#d68910">HTTP 400</text>
  <text x="195" y="1026" text-anchor="middle" font-size="10" fill="#666">{status: "failed", message: "Invalid period"}</text>

  <!-- ============================================ -->
  <!-- FLOW 4: Server Error with Error Logging -->
  <!-- ============================================ -->
  
  <rect x="30" y="1055" width="1040" height="25" rx="3" fill="#f9ebea" stroke="#d5a6a0" stroke-width="1"/>
  <text x="550" y="1072" text-anchor="middle" font-size="12" font-weight="bold" fill="#922b21">Error Path: Unhandled Exception (500 + Error Logging)</text>

  <!-- Normal flow until service -->
  <line x1="110" y1="1100" x2="270" y2="1100" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="190" y="1093" text-anchor="middle" font-size="11" fill="#333">GET /api/v1/overview</text>

  <line x1="280" y1="1120" x2="630" y2="1120" stroke="#999" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <text x="455" y="1113" text-anchor="middle" font-size="10" fill="#999">Auth ✓ → Params ✓ → Service call</text>

  <!-- Service encounters error -->
  <line x1="640" y1="1145" x2="815" y2="1145" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="727" y="1138" text-anchor="middle" font-size="11" fill="#333">Query database</text>

  <!-- DB error -->
  <line x1="825" y1="1165" x2="985" y2="1165" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="910" y="1158" text-anchor="middle" font-size="10" fill="#333">SELECT ...</text>

  <line x1="985" y1="1185" x2="835" y2="1185" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="910" y="1178" text-anchor="middle" font-size="10" fill="#c0392b">⚡ Connection Error</text>

  <!-- Exception bubbles up -->
  <line x1="815" y1="1205" x2="650" y2="1205" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="732" y="1198" text-anchor="middle" font-size="10" fill="#c0392b">Exception raised</text>

  <!-- Global exception handler catches and logs -->
  <rect x="615" y="1215" width="50" height="30" fill="#fdedec" stroke="#c0392b" stroke-width="1"/>
  <text x="640" y="1230" text-anchor="middle" font-size="9" fill="#c0392b">Global</text>
  <text x="640" y="1240" text-anchor="middle" font-size="9" fill="#c0392b">Handler</text>

  <!-- Log error to DB -->
  <line x1="640" y1="1255" x2="985" y2="1255" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowhead-red)"/>
  <text x="812" y="1248" text-anchor="middle" font-size="10" fill="#c0392b">INSERT into error_log (function, file, stack_trace)</text>

  <!-- Return 500 -->
  <line x1="630" y1="1280" x2="120" y2="1280" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="375" y="1273" text-anchor="middle" font-size="11" fill="#c0392b">HTTP 500 - {status: "error", message: "An unexpected error occurred..."}</text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d68910"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="30" y="1310" width="1040" height="30" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <line x1="50" y1="1325" x2="90" y2="1325" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="95" y="1329" font-size="10" fill="#333">Request</text>
  <line x1="170" y1="1325" x2="210" y2="1325" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-green)"/>
  <text x="215" y="1329" font-size="10" fill="#333">Success Response</text>
  <line x1="330" y1="1325" x2="370" y2="1325" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)"/>
  <text x="375" y="1329" font-size="10" fill="#333">Error Response</text>
  <line x1="490" y1="1325" x2="530" y2="1325" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-purple)"/>
  <text x="535" y="1329" font-size="10" fill="#333">Data Return</text>
  <rect x="630" y="1318" width="14" height="14" fill="#fef9e7" stroke="#d68910" stroke-width="1"/>
  <text x="650" y="1329" font-size="10" fill="#333">Processing Step</text>
</svg>
